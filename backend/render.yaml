services:
  - type: web
    name: micro-erp-api
    env: node
    region: ohio
    # Monorepo: Render clona en la raíz del repo, no dentro de backend.
    buildCommand: cd backend && pnpm install --frozen-lockfile && pnpm run build
    startCommand: cd backend && pnpm run start:prod
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CRON_SECRET
        sync: false
