# Backend Render config
# https://docs.render.com/blueprint-spec

services:
  # ── Backend (NestJS) ─────────────────────────────────────
  - type: web
    name: micro-erp-api
    runtime: node
    plan: free
    # Monorepo: Render clona en la raíz, por eso los comandos deben entrar a /backend.
    buildCommand: cd backend && pnpm install --frozen-lockfile && pnpm run build
    # start:prod ejecuta prestart:prod y garantiza migraciones antes del arranque.
    startCommand: cd backend && pnpm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # https://micro-erp-demo.vercel.app
      - key: CRON_SECRET
        sync: false
      - key: PORT
        value: 10000
