# Backend Render config
# https://docs.render.com/blueprint-spec

services:
  # ── Backend (NestJS) ─────────────────────────────────────
  - type: web
    name: micro-erp-api
    runtime: node
    plan: free
    # Monorepo: Render clona en la raíz, por eso los comandos deben entrar a /backend.
    buildCommand: cd backend && pnpm install --frozen-lockfile && pnpm run build
    # start:prod ejecuta prestart:prod y garantiza migraciones antes del arranque.
    startCommand: cd backend && pnpm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_SUMMARY_SECRET
        sync: false  # Secreto dedicado para magic links de resumen (72h). Set manually.
      - key: JWT_RESET_SECRET
        sync: false  # Secreto dedicado para tokens de reset de password (15m). Set manually.
      - key: REDIS_URL
        sync: false  # Cola BullMQ de emails. Render Key Value o Upstash (gratis). Set manually.
      - key: GMAIL_USER
        sync: false  # Cuenta Gmail que envía los emails de recuperación. Set manually.
      - key: GMAIL_APP_PASSWORD
        sync: false  # App Password de Gmail (no la contraseña normal). Set manually.
      - key: FRONTEND_URL
        sync: false  # https://micro-erp-demo.vercel.app
      - key: CRON_SECRET
        sync: false
      - key: PORT
        value: 10000
